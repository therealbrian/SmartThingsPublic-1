name: Build PlexBooks APK

on:
  push:
    branches: ["claude/plex-android-app-6cyxn1", "master"]
    paths: ["plex-books/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Point Gradle at Android SDK
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > plex-books/local.properties

      - name: Build debug APK
        working-directory: plex-books
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlexBooks-debug
          path: plex-books/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
